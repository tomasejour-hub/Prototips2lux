name: Deploy to OVH
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftp.cluster121.hosting.ovh.net
          username: prototg
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /www/