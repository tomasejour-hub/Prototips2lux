name: Deploy to OVH

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ftp.cluster121.hosting.ovh.net
          username: prototg
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: './site/*'
          remote_path: '/home/prototg/www'
          sftp_only: true
          delete_remote_files: false