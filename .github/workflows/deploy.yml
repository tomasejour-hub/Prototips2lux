name: Deploy to OVH
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SFTP Deploy
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ftp.cluster121.hosting.ovh.net
          username: prototg
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: ./*
          remote_path: /home/prototg/www
          sftp_only: true